server:
  port: 8080
spring:
  application:
  name: recetario
services:

  mongo:
    image: mongo:7
    container_name: recetario-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
    volumes:
      - mongo_data:/data/db
volumes:
  mongo_data: